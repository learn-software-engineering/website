
title: "Learn-Software.com"

defaultContentLanguage: en
defaultContentLanguageInSubdir: false

languages:
  en:
    languageName: English
    weight: 1
  es:
    languageName: Español
    weight: 2

# Parse Git commit
enableGitInfo: true

markup:
  goldmark:
    duplicateResourceFiles: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ["$$", "$$"]]
          inline: [['\(', '\)']]
        enable: true
    renderer:
      unsafe: true

menu:
  main:
    - identifier: paths
      weight: 1
    - identifier: programming
      pageRef: /programming
      parent: paths
    - identifier: softwareEngineering
      pageRef: /software-engineering
      parent: paths
    - identifier: artificialIntelligence
      pageRef: /ai
      parent: paths
    - identifier: blog
      pageRef: /blog
      weight: 2
    - identifier: about
      pageRef: /about
      weight: 3
    - identifier: search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/learn-software-engineering"
      params:
        icon: github
    - identifier: languageSwitcher
      params:
        type: language-switch
        label: false
        icon: "globe"
    - identifier: themeToggle
      params:
        type: theme-toggle
        label: false

outputs:
  home: [html, llms]
  page: [html, markdown]
  section: [html, rss, markdown]
