blog:
  list:
    displayTags: true

# Display the last modification date
displayUpdatedDate: true

# Display the author of the last modification
displayUpdatedAuthor: true

editURL:
  enable: true
  base: "https://github.com/learn-software-engineering/website/edit/main"

externalLinkDecoration: false

imageZoom:
  enable: true

navbar:
  displayTitle: true
  displayLogo: true
  logo:
    path: favicon.svg
    dark: favicon.svg
    link: /
    width: 40
    height: 20

page:
  contextMenu:
    enable: true
  # full (100%), wide (90rem), normal (1280px)
  width: wide

theme:
  # light | dark | system
  default: system
  displayToggle: true

toc:
  displayTags: true
